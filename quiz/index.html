<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Business Path</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --charcoal:#2b2420;
  --charcoal-mid:#3d3330;
  --coral:#d4694a;
  --coral-bright:#e07d5f;
  --coral-muted:#b85a3c;
  --coral-faint:rgba(212,105,74,.1);
  --coral-border:rgba(212,105,74,.3);
  --rose:#c4607a;
  --sand:#e8ddd0;
  --sand-light:#f2ece4;
  --cream:#faf6f0;
  --cream-border:rgba(43,36,32,.12);
  --text-dark:#2b2420;
  --text-mid:#6b5a52;
  --text-soft:#9e8a80;
  --white:#ffffff;
}

body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh;overflow-x:hidden;}

/* ── background ── */
.bg{position:fixed;inset:0;z-index:0;background:var(--cream);overflow:hidden;}
.bg::before{content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 50% at 10% 5%, rgba(212,105,74,.08) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 90% 95%, rgba(196,96,122,.07) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(232,221,208,.5) 0%,transparent 70%);
}
.bg-blob{position:absolute;border-radius:50%;filter:blur(90px);animation:drift 16s ease-in-out infinite alternate;}
.bg-blob:nth-child(1){width:600px;height:600px;background:rgba(212,105,74,.07);top:-200px;left:-180px;animation-duration:18s;}
.bg-blob:nth-child(2){width:480px;height:480px;background:rgba(196,96,122,.06);bottom:-150px;right:-150px;animation-duration:14s;animation-delay:-5s;}
.bg-blob:nth-child(3){width:360px;height:360px;background:rgba(232,221,208,.5);top:38%;left:48%;animation-duration:20s;animation-delay:-9s;}
@keyframes drift{from{transform:translate(0,0) scale(1)}to{transform:translate(22px,14px) scale(1.06)}}

.app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:1.5rem 1.25rem 5rem;}

/* ── brand ── */
.brand{text-align:center;padding:2.5rem 0 2rem;}
.brand-eyebrow{display:inline-flex;align-items:center;gap:.75rem;font-size:.78rem;letter-spacing:.38em;text-transform:uppercase;color:var(--coral);font-weight:500;margin-bottom:1.1rem;}
.brand-eyebrow::before,.brand-eyebrow::after{content:'';width:32px;height:1px;background:var(--coral-border);}
.brand h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,8vw,4.2rem);font-weight:400;line-height:1.08;color:var(--charcoal);margin-bottom:.9rem;letter-spacing:.01em;}
.brand h1 em{font-style:italic;color:var(--coral);}
.brand-sub{font-size:1.05rem;color:var(--text-mid);line-height:1.85;max-width:440px;margin:0 auto;font-weight:300;}
.brand-divider{display:flex;align-items:center;gap:1rem;margin:1.4rem auto 0;max-width:220px;}
.brand-divider::before,.brand-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--coral-border));}
.brand-divider::after{background:linear-gradient(90deg,var(--coral-border),transparent);}
.brand-divider span{font-size:.7rem;color:var(--coral);letter-spacing:.2em;}

/* ── progress ── */
.progress{margin:0 0 1.4rem;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;}
.prog-label{font-size:.85rem;color:var(--text-soft);letter-spacing:.04em;font-weight:300;}
.prog-step{font-size:.85rem;color:var(--coral);font-weight:600;letter-spacing:.04em;}
.bar{height:3px;background:rgba(212,105,74,.12);border-radius:99px;overflow:hidden;}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--coral-muted),var(--coral-bright));border-radius:99px;transition:width .55s cubic-bezier(.4,0,.2,1);}

/* ── card ── */
.card{
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(20px);
  border:1px solid rgba(212,105,74,.15);
  border-top:2px solid rgba(212,105,74,.25);
  border-radius:24px;
  padding:2.5rem 2.25rem 2.25rem;
  box-shadow:0 12px 48px rgba(43,36,32,.08), 0 2px 8px rgba(43,36,32,.04);
  animation:slideUp .4s cubic-bezier(.2,.8,.3,1) both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

/* coral accent strip at top of card */
.card::before{content:'';display:block;width:48px;height:2px;background:linear-gradient(90deg,var(--coral),var(--rose));border-radius:99px;margin-bottom:1.5rem;}

.q-tag{display:inline-block;font-size:.75rem;letter-spacing:.28em;text-transform:uppercase;color:var(--coral);font-weight:500;margin-bottom:.65rem;opacity:.7;}
.q-text{font-family:'Cormorant Garamond',serif;font-size:clamp(1.55rem,4vw,2rem);font-weight:400;line-height:1.35;color:var(--charcoal);margin-bottom:.45rem;}
.q-hint{font-size:.93rem;color:var(--text-soft);line-height:1.7;margin-bottom:1.4rem;font-weight:300;}

/* ── options ── */
.opts{display:grid;gap:.5rem;}
.opts.two{grid-template-columns:1fr 1fr;}
@media(max-width:440px){.opts.two{grid-template-columns:1fr;}}

.opt{
  display:flex;align-items:center;gap:.85rem;
  padding:.95rem 1.2rem;
  border:1.5px solid rgba(43,36,32,.1);
  border-radius:14px;
  background:rgba(250,246,240,.6);
  cursor:pointer;font-size:.97rem;line-height:1.45;
  transition:all .18s ease;user-select:none;-webkit-tap-highlight-color:transparent;
  position:relative;overflow:hidden;
}
.opt::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(212,105,74,.05),transparent);opacity:0;transition:opacity .18s;}
.opt:hover::before{opacity:1;}
.opt:hover{border-color:rgba(212,105,74,.35);transform:translateY(-1px);}
.opt.sel{border-color:var(--coral);background:rgba(212,105,74,.07);}
.opt.sel::before{opacity:1;}
.opt-em{font-size:1.2rem;flex-shrink:0;}
.opt-txt{flex:1;color:var(--text-dark);font-weight:300;}
.opt.sel .opt-txt{font-weight:600;color:var(--charcoal);}
.opt-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:1.5px solid rgba(43,36,32,.2);display:flex;align-items:center;justify-content:center;transition:all .18s;}
.opt.sel .opt-dot{background:var(--coral);border-color:var(--coral);}
.opt.sel .opt-dot::after{content:'✓';font-size:.62rem;color:white;font-weight:800;}
.opt-sq{border-radius:5px;}

/* ── nav ── */
.nav{display:flex;align-items:center;justify-content:space-between;margin-top:1.85rem;gap:1rem;}
.btn-back{padding:.65rem 1.45rem;border-radius:99px;border:1.5px solid rgba(43,36,32,.15);background:transparent;color:var(--text-soft);font-size:.93rem;font-family:'Jost',sans-serif;cursor:pointer;transition:all .18s;font-weight:400;}
.btn-back:hover{border-color:var(--coral-border);color:var(--coral);}
.btn-next{flex:1;max-width:230px;padding:.88rem 1.5rem;border-radius:99px;border:none;background:linear-gradient(135deg,var(--coral-muted),var(--coral-bright));color:white;font-size:1rem;font-weight:600;font-family:'Jost',sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(212,105,74,.3);transition:all .2s ease;letter-spacing:.03em;}
.btn-next:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(212,105,74,.42);}
.btn-next:disabled{opacity:.28;cursor:not-allowed;transform:none;}

/* ── loading ── */
.loading{text-align:center;padding:3.5rem 1rem;}
.spin{font-size:2.6rem;animation:rotate 2.2s linear infinite;display:inline-block;margin-bottom:1.25rem;}
@keyframes rotate{to{transform:rotate(360deg)}}
.loading h3{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;font-style:italic;color:var(--charcoal);margin-bottom:.5rem;}
.loading p{font-size:.95rem;color:var(--text-soft);font-weight:300;}

/* ── result ── */
.result-hero{text-align:center;padding:.5rem 0 1.5rem;}
.result-badge{width:82px;height:82px;border-radius:50%;background:linear-gradient(135deg,rgba(212,105,74,.12),rgba(196,96,122,.08));border:1.5px solid var(--coral-border);display:flex;align-items:center;justify-content:center;font-size:2.2rem;margin:0 auto 1rem;box-shadow:0 4px 20px rgba(212,105,74,.12);}
.result-eyebrow{font-size:.75rem;letter-spacing:.32em;text-transform:uppercase;color:var(--coral);font-weight:500;margin-bottom:.5rem;}
.result-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,5vw,2.6rem);color:var(--charcoal);margin-bottom:.3rem;font-weight:400;}
.result-title em{font-style:italic;color:var(--coral);}
.result-tagline{font-size:.97rem;color:var(--text-soft);font-style:italic;margin-bottom:1rem;font-weight:300;}
.result-desc{font-size:1rem;color:var(--text-mid);line-height:1.9;margin-bottom:1.3rem;text-align:left;font-weight:300;}

.result-tags{display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:1.6rem;}
.rtag{font-size:.8rem;padding:.32rem .92rem;border-radius:99px;font-weight:500;background:rgba(43,36,32,.06);color:var(--text-mid);border:1px solid rgba(43,36,32,.1);letter-spacing:.02em;}
.rtag.gold{background:rgba(212,105,74,.1);color:var(--coral-muted);border-color:var(--coral-border);}

/* divider */
.cream-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(43,36,32,.1),transparent);margin:1.5rem 0;}

/* ── opp box ── */
.opp-box{
  background:linear-gradient(135deg,rgba(212,105,74,.06),rgba(196,96,122,.04));
  border:1.5px solid rgba(212,105,74,.2);
  border-radius:16px;padding:1.35rem 1.5rem;margin-bottom:1.6rem;
  text-align:left;position:relative;overflow:hidden;
}
.opp-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--coral),var(--rose));opacity:.5;}
.opp-label{font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--coral);font-weight:600;margin-bottom:.5rem;}
.opp-name{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--charcoal);margin-bottom:.4rem;font-weight:400;}
.opp-desc{font-size:.96rem;color:var(--text-mid);line-height:1.82;font-weight:300;}

/* ── capture ── */
.capture-box{
  background:linear-gradient(135deg,rgba(212,105,74,.05),rgba(196,96,122,.04));
  border:1.5px solid rgba(212,105,74,.18);
  border-radius:18px;padding:1.6rem 1.6rem 1.4rem;
}
.capture-box h3{font-family:'Cormorant Garamond',serif;font-size:1.45rem;color:var(--charcoal);margin-bottom:.35rem;font-weight:400;}
.capture-box p{font-size:.95rem;color:var(--text-soft);line-height:1.75;margin-bottom:1.15rem;font-weight:300;}
.field{width:100%;padding:.92rem 1.15rem;border:1.5px solid rgba(43,36,32,.15);border-radius:12px;background:rgba(255,255,255,.8);font-family:'Jost',sans-serif;font-size:1rem;color:var(--charcoal);outline:none;transition:border-color .18s;font-weight:300;margin-bottom:.6rem;}
.field::placeholder{color:var(--text-soft);}
.field:focus{border-color:var(--coral);}
.field-insta{position:relative;}
.field-insta::before{content:'@';position:absolute;left:1.15rem;top:50%;transform:translateY(-50%);font-size:.95rem;color:var(--text-soft);pointer-events:none;z-index:1;}
.field-insta .field{padding-left:1.85rem;}
.btn-submit{width:100%;margin-top:.4rem;padding:.95rem;border-radius:99px;border:none;background:linear-gradient(135deg,var(--coral-muted),var(--coral-bright));color:white;font-size:1.05rem;font-weight:600;font-family:'Jost',sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(212,105,74,.3);transition:all .2s;letter-spacing:.03em;}
.btn-submit:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(212,105,74,.42);}
.btn-submit:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.privacy{font-size:.82rem;color:var(--text-soft);text-align:center;margin-top:.75rem;font-weight:300;}

/* ── connected banner ── */
.connected-banner{background:linear-gradient(135deg,rgba(212,105,74,.07),rgba(196,96,122,.05));border:1.5px solid rgba(212,105,74,.2);border-radius:14px;padding:1.1rem 1.35rem;margin-top:1.4rem;display:flex;align-items:flex-start;gap:.9rem;}
.connected-icon{font-size:1.4rem;flex-shrink:0;margin-top:.1rem;}
.connected-text{font-size:.9rem;color:var(--text-mid);line-height:1.75;font-weight:300;}
.connected-text strong{color:var(--charcoal);font-weight:600;}

/* ── thank you ── */
.thankyou{text-align:center;padding:1.5rem 0;}
.ty-icon{font-size:2.75rem;margin-bottom:.85rem;}
.thankyou h3{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:400;color:var(--charcoal);margin-bottom:.65rem;}
.thankyou p{font-size:1rem;color:var(--text-mid);line-height:1.85;max-width:400px;margin:0 auto;font-weight:300;}
.thankyou p+p{margin-top:.9rem;}

/* ── restart ── */
.restart{display:block;margin:1.75rem auto 0;padding:.72rem 1.9rem;border-radius:99px;border:1.5px solid rgba(212,105,74,.25);background:transparent;color:var(--coral);font-size:.92rem;font-family:'Jost',sans-serif;cursor:pointer;transition:all .2s;font-weight:400;letter-spacing:.04em;}
.restart:hover{background:var(--coral-faint);border-color:var(--coral);}

/* ── error msg ── */
.err{font-size:.85rem;color:#c0392b;background:rgba(192,57,43,.07);border:1px solid rgba(192,57,43,.2);border-radius:10px;padding:.7rem 1rem;margin-top:.5rem;display:none;}
.err.show{display:block;}

/* ── brand logo strip ── */
.brand-logo{text-align:center;padding:1.75rem 0 .5rem;}

/* ── cover page ── */
.cover{text-align:center;animation:slideUp .5s cubic-bezier(.2,.8,.3,1) both;}
.cover-sunburst{width:90px;height:90px;margin:0 auto 1.5rem;position:relative;}
.cover-sunburst svg{width:100%;height:100%;}
.cover-eyebrow{font-size:.75rem;letter-spacing:.35em;text-transform:uppercase;color:var(--coral);font-weight:500;margin-bottom:1rem;}
.cover h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,8vw,4rem);font-weight:400;line-height:1.1;color:var(--charcoal);margin-bottom:.5rem;letter-spacing:.01em;}
.cover h1 em{font-style:italic;color:var(--coral);}
.cover-divider{display:flex;align-items:center;gap:1rem;margin:1.2rem auto;max-width:200px;}
.cover-divider::before,.cover-divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--coral-border));}
.cover-divider::after{background:linear-gradient(90deg,var(--coral-border),transparent);}
.cover-divider span{font-size:.7rem;color:var(--coral);letter-spacing:.2em;}
.cover-desc{font-size:1.05rem;color:var(--text-mid);line-height:1.85;max-width:440px;margin:0 auto 1.5rem;font-weight:300;}
.cover-promise{
  display:flex;flex-direction:column;gap:.7rem;
  background:rgba(255,255,255,.7);
  border:1px solid rgba(212,105,74,.15);
  border-radius:18px;padding:1.4rem 1.6rem;
  margin:0 auto 2rem;max-width:440px;text-align:left;
}
.cover-promise-item{display:flex;align-items:flex-start;gap:.75rem;font-size:.95rem;color:var(--text-mid);line-height:1.55;font-weight:300;}
.cover-promise-icon{font-size:1.1rem;flex-shrink:0;margin-top:.05rem;}
.cover-promise-item strong{color:var(--charcoal);font-weight:600;}
.cover-meta{font-size:.82rem;color:var(--text-soft);margin-bottom:1.75rem;letter-spacing:.03em;}
.cover-meta span{display:inline-flex;align-items:center;gap:.4rem;}
.cover-meta span+span::before{content:'·';margin:0 .5rem;opacity:.4;}
.btn-start{
  display:inline-block;padding:1rem 2.5rem;
  border-radius:99px;border:none;
  background:linear-gradient(135deg,var(--coral-muted),var(--coral-bright));
  color:white;font-size:1.05rem;font-weight:600;
  font-family:'Jost',sans-serif;cursor:pointer;
  box-shadow:0 6px 24px rgba(212,105,74,.35);
  transition:all .22s ease;letter-spacing:.03em;
}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(212,105,74,.45);}
.cover-footer{font-size:.78rem;color:var(--text-soft);margin-top:1rem;opacity:.7;}
</style>
</head>
<body>
<div class="bg"><div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div></div>

<div class="app">
  <div class="brand-logo" id="brand-logo">
    <div class="brand-eyebrow">Rise Beyond the 9 to 5</div>
  </div>
  <div id="root"></div>
</div>

<script>
// ─────────────────────────────────────────────

// after completing the setup guide below

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbxiQCcmPZT1RQUFrzOxte13UNgRZgqLnlf99ScGdhGfKHBUx3gOSXDDRDkCWg0pd7_t/exec';

// ── QUESTIONS ────────────────────────────────
const Qs = [
  {
    id:'job', type:'single',
    text:'What best describes your current situation?',
    opts:[
      {e:'💼', l:'Employed full-time & looking for a way out'},
      {e:'⏰', l:'Working part-time or casually'},
      {e:'🏠', l:'Parent or carer at home'},
      {e:'🎓', l:'Studying or just finished studying'},
      {e:'🌀', l:'In between things — open to anything'},
      {e:'🚀', l:'Already self-employed, want to grow'},
    ]
  },
  {
    id:'experience', type:'single',
    text:'Have you tried building a business before?',
    opts:[
      {e:'🌱', l:'No — this would be my first time'},
      {e:'👀', l:'I\'ve thought about it but never started'},
      {e:'⚡', l:'Yes — tried something but it didn\'t work out'},
      {e:'✅', l:'Yes — I have some business experience'},
    ]
  },
  {
    id:'age', type:'single',
    text:'Which age range are you in?',
    hint:'This helps us match you to mentors at a similar life stage.',

      {e:'🌹', l:'55+'},
    ]
  },
  {
    id:'enjoy', type:'multi',
    text:'What do you genuinely enjoy doing?',
    hint:'Choose everything that feels like you — no wrong answers.',
    cols:2,

      {e:'💬', l:'Talking, connecting & helping people'},

      {e:'🎨', l:'Creativity & designing things'},
      {e:'✈️', l:'Travelling & exploring the world'},
      {e:'📚', l:'Learning & personal growth'},
      {e:'💡', l:'Starting & building something new'},
      {e:'🌿', l:'Health, wellness & natural living'},
      {e:'🎯', l:'Inspiring & motivating others'},
    ]
  },
  {
    id:'skills', type:'multi',
    text:'What skills or experience do you have?',
    hint:'Include paid work, volunteer work, study — anything counts.',
    cols:2,
    opts:[
      {e:'🗣️', l:'Customer service or sales'},

  },
  {
    id:'time', type:'single',
    text:'How many hours a week can you realistically dedicate?',
    opts:[
      {e:'🌙', l:'Under 10 hours — life is full right now'},
      {e:'⏱️', l:'10–20 hours — serious side hustle time'},

  },
  {

      {e:'🌿', l:'USD $1,500–$4,000/month'},
      {e:'🌳', l:'USD $4,000–$8,000/month'},

  {
    id:'fear', type:'multi',

// ── SCORING (Enagic biased) ──────────────────
function scoreAnswers(ans) {
  const s={enagic:0,va:0,social:0,coaching:0,travel:0,digital:0,copy:0};
  const hasL=(id,sub)=>{
    const q=Qs.find(q=>q.id===id); const a=ans[id];
    if(!q||a===undefined) return false;
    const chk=i=>q.opts[i].l.toLowerCase().includes(sub.toLowerCase());
    return Array.isArray(a)?a.some(chk):chk(a);
  };

  // ENAGIC — broad bias
  if(hasL('enjoy','inspiring'))     s.enagic+=3;
  if(hasL('enjoy','building'))      s.enagic+=3;
  if(hasL('enjoy','connecting'))    s.enagic+=2;
  if(hasL('enjoy','learning'))      s.enagic+=2;
  if(hasL('enjoy','health'))        s.enagic+=3;
  if(hasL('skills','networking'))   s.enagic+=3;
  if(hasL('skills','motivating'))   s.enagic+=3;
  if(hasL('skills','communication'))s.enagic+=2;
  if(hasL('skills','relationship')) s.enagic+=2;
  if(hasL('workstyle','mentor'))    s.enagic+=3;
  if(hasL('workstyle','system'))    s.enagic+=3;
  if(hasL('workstyle','one-on-one'))s.enagic+=2;
  if(hasL('workstyle','team'))      s.enagic+=3;
  if(hasL('values','community'))    s.enagic+=3;
  if(hasL('values','passive'))      s.enagic+=3;
  if(hasL('values','earning'))      s.enagic+=2;
  if(hasL('values','freedom'))      s.enagic+=2;
  if(hasL('values','helping'))      s.enagic+=2;
  if(hasL('values','anywhere'))     s.enagic+=2;
  if(hasL('income','8,000'))        s.enagic+=3;
  if(hasL('income','4,000'))        s.enagic+=2;
  if(hasL('start','mentor'))        s.enagic+=3;
  if(hasL('start','fast'))          s.enagic+=2;
  if(hasL('fear','ready'))          s.enagic+=2;
  if(hasL('experience','experience'))s.enagic+=1;
  if(hasL('job','employed full'))   s.enagic+=2;
  if(hasL('job','stay-at-home'))    s.enagic+=2;

  // VA
  if(hasL('enjoy','organis'))       s.va+=3;
  if(hasL('skills','admin'))        s.va+=3;
  if(hasL('skills','it, tech'))     s.va+=2;
  if(hasL('skills','writing'))      s.va+=1;
  if(hasL('workstyle','behind'))    s.va+=2;
  if(hasL('values','freedom'))      s.va+=1;
  if(hasL('values','anywhere'))     s.va+=1;
  if(hasL('start','fast'))          s.va+=2;
  if(hasL('time','10–20'))          s.va+=1;
  if(hasL('fear','begin'))          s.va+=1;

  // SOCIAL
  if(hasL('enjoy','social media'))  s.social+=3;
  if(hasL('enjoy','content'))       s.social+=3;
  if(hasL('enjoy','creativity'))    s.social+=2;
  if(hasL('skills','marketing'))    s.social+=3;
  if(hasL('skills','design'))       s.social+=2;
  if(hasL('workstyle','camera'))    s.social+=2;
  if(hasL('values','brand'))        s.social+=2;
  if(hasL('tech','savvy'))          s.social+=2;
  if(hasL('tech','love'))           s.social+=2;

  // COACHING
  if(hasL('skills','teaching'))     s.coaching+=3;
  if(hasL('skills','coaching'))     s.coaching+=3;
  if(hasL('skills','management'))   s.coaching+=2;
  if(hasL('skills','health'))       s.coaching+=2;
  if(hasL('enjoy','inspiring'))     s.coaching+=2;
  if(hasL('enjoy','learning'))      s.coaching+=2;
  if(hasL('workstyle','one-on-one'))s.coaching+=2;
  if(hasL('values','helping'))      s.coaching+=2;
  if(hasL('values','knowledge'))    s.coaching+=2;
  if(hasL('income','4,000'))        s.coaching+=1;
  if(hasL('income','8,000'))        s.coaching+=1;
  if(hasL('experience','experience'))s.coaching+=2;

  // TRAVEL
  if(hasL('enjoy','travel'))        s.travel+=4;
  if(hasL('enjoy','exploring'))     s.travel+=3;
  if(hasL('skills','customer'))     s.travel+=2;
  if(hasL('skills','networking'))   s.travel+=1;
  if(hasL('skills','writing'))      s.travel+=1;
  if(hasL('workstyle','one-on-one'))s.travel+=2;
  if(hasL('values','freedom'))      s.travel+=1;
  if(hasL('values','anywhere'))     s.travel+=2;

  // DIGITAL
  if(hasL('enjoy','creativity'))    s.digital+=3;

// ── STATE ────────────────────────────────────
let step='cover', answers={}, result=null, leadData={};

// ── RENDER ───────────────────────────────────
function render(){
  const root=document.getElementById('root');
  const logo=document.getElementById('brand-logo');
  if(step==='cover'){
    logo.style.display='block';
    renderCover(root);
  } else {
    logo.style.display='none';
    if(step<Qs.length)           renderQ(root);
    else if(step===Qs.length)    renderCapture(root);
    else if(step==='loading')    renderLoading(root);
    else if(step==='result')     renderResult(root);
  }
}

      </div>

function startQuiz(){ step=0; render(); }

function renderQ(root){
  const q=Qs[step], total=Qs.length;
  const pct=Math.round((step/total)*100);
  const a=answers[q.id];
  const ok=q.type==='single'?(a!==undefined):(Array.isArray(a)&&a.length>0);
  root.innerHTML=`
    <div class="progress">
      <div class="progress-top">
        <span class="prog-label">Your path is taking shape…</span>
        <span class="prog-step">${step+1} of ${total}</span>
      </div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card">
      <div class="q-tag">Question ${step+1}</div>
      <div class="q-text">${q.text}</div>
      ${q.hint?`<div class="q-hint">${q.hint}</div>`:''}
      <div class="opts ${q.cols===2?'two':''}">
        ${q.opts.map((o,i)=>`
          <div class="opt ${isSel(q,i)?'sel':''}" onclick="tap(${i})">
            <span class="opt-em">${o.e}</span>
            <span class="opt-txt">${o.l}</span>
            <span class="opt-dot ${q.type==='multi'?'opt-sq':''}"></span>
          </div>
        `).join('')}
      </div>
      <div class="nav">
        ${step>0?`<button class="btn-back" onclick="back()">← Back</button>`:`<span></span>`}
        <button class="btn-next" ${ok?'':'disabled'} onclick="next()">
          ${step===total-1?'Almost there →':'Continue →'}
        </button>
      </div>
    </div>`;
}

// ── HELPERS ──────────────────────────────────
function isSel(q,i){
  const a=answers[q.id];
  return q.type==='single'?a===i:(Array.isArray(a)&&a.includes(i));
}

function tap(i){
  const q=Qs[step];
  if(q.type==='single'){ answers[q.id]=i; }
  else{
    if(!answers[q.id]) answers[q.id]=[];
    const idx=answers[q.id].indexOf(i);
    idx>-1?answers[q.id].splice(idx,1):answers[q.id].push(i);
  }
  render();
}

function back(){
  if(step===Qs.length){ step=Qs.length-1; render(); }
  else if(step>0){ step--; render(); }
}

function next(){
  const q=Qs[step], a=answers[q.id];
  const ok=q.type==='single'?(a!==undefined):(Array.isArray(a)&&a.length>0);
  if(ok){ step++; render(); }
}

function getLabel(id){
  const q=Qs.find(q=>q.id===id); const a=answers[id];
  if(!q||a===undefined) return '';
  if(Array.isArray(a)) return a.map(i=>q.opts[i].l).join(', ');
  return q.opts[a].l;
}

async function submitCapture(){
  const name=document.getElementById('g-name').value.trim();
  const email=document.getElementById('g-email').value.trim();
  const insta=document.getElementById('g-insta').value.trim().replace(/^@/,'');
  const errEl=document.getElementById('cap-err');
  if(!name||!email||!email.includes('@')){ errEl.classList.add('show'); return; }
  errEl.classList.remove('show');
  leadData={name,email,insta};

  // Score answers
  result=scoreAnswers(answers);

  // Build payload for Google Sheets
  const payload={
    timestamp: new Date().toISOString(),
    name, email,
    instagram: insta||'',
    business_match: CATS[result].title,
    job_situation: getLabel('job'),
    experience: getLabel('experience'),
    age_range: getLabel('age'),
    enjoys: getLabel('enjoy'),
    skills: getLabel('skills'),
    work_style: getLabel('workstyle'),
    hours_per_week: getLabel('time'),
    income_goal: getLabel('income'),
    biggest_fear: getLabel('fear'),
    tech_level: getLabel('tech'),
    values: getLabel('values'),
    how_to_start: getLabel('start'),
  };

  // Send to Google Sheets (fire and forget — don't block results)
  if(SHEET_URL && SHEET_URL !== 'YOUR_GOOGLE_SCRIPT_URL_HERE'){
    fetch(SHEET_URL, {
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    }).catch(()=>{}); // silent fail — results still show
  }
  console.log('Lead payload:', payload);

  step='loading';
  render();
  setTimeout(()=>{ step='result'; render(); }, 1800);
}

function restart(){ step='cover'; answers={}; result=null; leadData={}; render(); }

render();
</script>
